name: E2E Smoke Test

on:
  workflow_dispatch:

concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOABLEAI_API_KEY: ${{ secrets.DOABLEAI_API_KEY }}
      DOABLEAI_GROUP_PUBLIC_ID: ${{ vars.DOABLEAI_GROUP_PUBLIC_ID }}
    steps:
      - name: Validate required secrets/inputs
        shell: bash
        run: |
          if [[ -z "${DOABLEAI_API_KEY}" ]]; then
            echo "Missing secret: DOABLEAI_API_KEY" >&2
            exit 1
          fi
          if [[ -z "${DOABLEAI_GROUP_PUBLIC_ID}" ]]; then
            echo "Provide variable: DOABLEAI_GROUP_PUBLIC_ID" >&2
            exit 1
          fi

      - name: Trigger DoableAI run via action
        id: trigger
        uses: getdoable/run-test-action@v1
        with:
          api-key: ${{ env.DOABLEAI_API_KEY }}
          group-public-id: ${{ env.DOABLEAI_GROUP_PUBLIC_ID }}
          idempotency-key: ${{ github.repository }}:${{ github.run_id }}:${{ github.run_attempt }}:smoke
          wait-for-completion: "true"
          poll-interval-seconds: "20"
          timeout-seconds: "1800"

      - name: Publish smoke summary
        if: always()
        shell: bash
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## DoableAI Trigger Smoke Result

          | Field | Value |
          | --- | --- |
          | Action Status | `${{ steps.trigger.outputs.status }}` |
          | Outcome | `${{ steps.trigger.outputs.outcome }}` |
          | Outcome Link | [Open Result](${{ steps.trigger.outputs.outcome-link }}) |
          EOF
