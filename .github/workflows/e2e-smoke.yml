name: E2E Smoke Test

on:
  workflow_dispatch:
    inputs:
      group_public_id:
        description: Optional override for target regression group public id.
        required: false
        type: string

concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOABLEAI_API_KEY: ${{ secrets.DOABLEAI_API_KEY }}
      DOABLEAI_GROUP_PUBLIC_ID: ${{ github.event.inputs.group_public_id || secrets.DOABLEAI_GROUP_PUBLIC_ID }}
    steps:
      - name: Validate required secrets/inputs
        shell: bash
        run: |
          if [[ -z "${DOABLEAI_API_KEY}" ]]; then
            echo "Missing secret: DOABLEAI_API_KEY" >&2
            exit 1
          fi
          if [[ -z "${DOABLEAI_GROUP_PUBLIC_ID}" ]]; then
            echo "Provide DOABLEAI_GROUP_PUBLIC_ID (secret or workflow input)." >&2
            exit 1
          fi

      - name: Prepare local action source
        shell: bash
        run: |
          git init
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach "${GITHUB_SHA}"

      - name: Trigger DoableAI run via action
        id: trigger
        uses: ./
        with:
          api-key: ${{ env.DOABLEAI_API_KEY }}
          group-public-id: ${{ env.DOABLEAI_GROUP_PUBLIC_ID }}
          idempotency-key: ${{ github.repository }}:${{ github.run_id }}:${{ github.run_attempt }}:smoke
          wait-for-completion: "true"
          poll-interval-seconds: "20"
          timeout-seconds: "1800"

      - name: Publish smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## DoableAI Trigger Smoke Result"
            echo ""
            echo "- Workflow run: \`${GITHUB_RUN_ID}\`"
            echo "- Action status: \`${{ steps.trigger.outputs.status }}\`"
            echo "- Outcome: \`${{ steps.trigger.outputs.outcome }}\`"
            echo "- Outcome Link: ${{ steps.trigger.outputs.outcome-link }}"
          } >> "$GITHUB_STEP_SUMMARY"
