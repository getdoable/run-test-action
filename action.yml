name: 'DoableAI Trigger Run'
description: 'Trigger DoableAI scheduled/group regression runs from GitHub Actions.'
author: 'DoableAI'

branding:
  icon: 'play'
  color: 'blue'

inputs:
  api-key:
    description: 'DoableAI API key from Settings -> API Keys.'
    required: true
  group-public-id:
    description: 'Scheduled group public id to trigger (for example: tg-xxxx).'
    required: true
  wait-for-completion:
    description: 'Whether to wait for terminal test result.'
    required: false
    default: 'true'
  poll-interval-seconds:
    description: 'Polling interval when waiting for completion.'
    required: false
    default: '20'
  timeout-seconds:
    description: 'Max seconds to wait for terminal status.'
    required: false
    default: '1800'
  idempotency-key:
    description: 'Optional idempotency key. If omitted, action generates one from GitHub context.'
    required: false

outputs:
  status:
    description: 'Action lifecycle status: accepted, completed, or timeout.'
  outcome:
    description: 'Execution outcome: pending, passed, failed, cancelled, or timeout.'
  outcome-link:
    description: 'DoableAI run report URL for this execution.'

runs:
  using: 'node20'
  main: 'dist/index.js'
